services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bakery_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bakery_hub
      DB_USER: postgres
      DB_PASSWORD: postgres123
      PORT: 3001
      JWT_SECRET: bakery_hub_super_secret_2024
      JWT_EXPIRES_IN: 8h
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata: